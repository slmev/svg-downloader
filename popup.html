<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 350px; 
      padding: 15px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
    }
    h2 { 
      margin-top: 0; 
      font-size: 18px;
      color: #333;
    }
    #status { 
      margin: 10px 0; 
      color: #666; 
      font-size: 14px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 8px;
      transition: background-color 0.2s;
    }
    button:disabled { 
      background-color: #ccc; 
      cursor: not-allowed; 
    }
    button:hover:not(:disabled) { 
      background-color: #45a049; 
    }
    #previewBtn {
      background-color: #2196F3;
    }
    #previewBtn:hover:not(:disabled) {
      background-color: #1976D2;
    }
    .log { 
      font-size: 12px; 
      color: #666; 
      margin-top: 10px; 
      max-height: 200px; 
      overflow-y: auto;
      background: #fafafa;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
      line-height: 1.6;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 10px 0;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <h2>📦 SVG 批量下载助手</h2>
  <div id="status">正在扫描页面...</div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <button id="downloadBtn" disabled>下载全部 (ZIP)</button>
  <button id="previewBtn" disabled>预览列表</button>
  <div id="log" class="log"></div>
  
  <!-- 引入 JSZip -->
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
